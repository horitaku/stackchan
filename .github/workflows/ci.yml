name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  server-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache-dependency-path: server/go.sum

      - name: Run unit tests
        run: go test ./... -timeout 120s

  webui-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/webui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/webui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build WebUI
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build runtime image
        run: docker build -f infra/docker/Dockerfile -t stackchan-server:ci .

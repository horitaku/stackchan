[tools]
node = "24"
go = "1.26"
python = "3.12"
pipx = "latest"
"pipx:platformio" = "latest"

[tasks."fw:build"]
description = "Build firmware (stackchan_cores3)"
run = "node ./tools/mise/fw.cjs build"

[tasks."fw:port"]
description = "Detect firmware serial port (prefer ESP32-S3 VID:PID=303A:1001)"
run = "node ./tools/mise/fw.cjs port"

[tasks."fw:upload"]
description = "Upload firmware to detected serial port"
run = "node ./tools/mise/fw.cjs upload"

[tasks."fw:monitor"]
description = "Open serial monitor on detected serial port"
run = "node ./tools/mise/fw.cjs monitor"

[tasks."fw:upmon"]
description = "Upload and monitor on detected serial port"
run = "node ./tools/mise/fw.cjs upmon"

[tasks."fw:clean"]
description = "Clean firmware build artifacts"
run = "node ./tools/mise/fw.cjs clean"

[tasks."server:healthz"]
description = "Check server healthz endpoint"
run = "node ./tools/mise/server.cjs healthz"

[tasks."webui:build"]
description = "Build WebUI (Svelte/Vite)"
run = "node ./tools/mise/server.cjs build_ui"

[tasks."server:run"]
description = "Build WebUI and run development server (Go + Gin)"
run = "node ./tools/mise/server.cjs run"

[tasks."server:kill8080"]
description = "Stop processes using TCP port 8080"
run = "node ./tools/mise/server.cjs kill8080"

[tasks."server:restart"]
description = "Stop TCP/8080 process, build WebUI, and run development server"
run = "node ./tools/mise/server.cjs restart"

[tasks."server:restart:bg"]
description = "Stop TCP/8080 process, build WebUI, and run development server in background"
run = "node ./tools/mise/server.cjs restart_bg"

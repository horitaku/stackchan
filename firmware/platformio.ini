; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = .
include_dir = include
extra_configs = 
	platformio.ini.local

[common]
framework = arduino
platform = espressif32 @ ^6.0.0
upload_speed = 921600
monitor_speed = 115200
lib_deps = 
	m5stack/M5Unified @ ^0.1.6
	https://github.com/stack-chan/m5stack-avatar.git#v0.10.0
	bblanchon/ArduinoJson @ ^6.21.0
	links2004/WebSockets @ ^2.4.1
	
	[stackchan]
	ws_url = ws://127.0.0.1:8080/ws

[env:stackchan_cores3]
platform = ${common.platform}
framework = ${common.framework}
board = m5stack-cores3
board_build.f_cpu = 240000000L
board_build.flash_mode = dio
upload_speed = ${common.upload_speed}
monitor_speed = ${common.monitor_speed}
monitor_filters = esp32_exception_decoder
build_flags = 
	-DFW_DEVICE_ID=\"stackchan-cores3-01\"
	-DFW_WS_URL=\"${stackchan.ws_url}\"
	-DFW_AUDIO_SAMPLE_RATE=16000
	-DFW_AUDIO_FRAME_MS=20
	-DFW_LOG_LEVEL=\"info\"
	-DFW_RECONNECT_BASE_MS=500
	-DFW_RECONNECT_MAX_MS=10000
	-DFW_HEARTBEAT_INTERVAL_MS=15000
	-DFW_TIMEZONE=\"Asia/Tokyo\"
	; ── Servo GPIO ピン設定 ─────────────────────────────────────────────
	; platformio.ini.local の [servo] セクションで上書きできます。
	; Port A: x_pin=1,  y_pin=2
	; Port C: x_pin=17, y_pin=18
	-DFW_SERVO_X_PIN=${servo.x_pin}
	-DFW_SERVO_Y_PIN=${servo.y_pin}
	; ── LED 設定 ─────────────────────────────────────────────
	; platformio.ini.local の [led] セクションでピン番号を上書きできます。
	-DFW_LED_PIN=${led.pin}
	-DFW_LED_NUM=${led.num}
	; ── NECO MIMI 設定 ─────────────────────────────────────
	; NECO MIMI を使わない場合は enabled=0 のままにする。
	; NECO MIMI を接続する場合は platformio.ini.local の [neco_mimi] セクションで設定する。
	-DFW_NECO_MIMI_ENABLED=${neco_mimi.enabled}
	-DFW_NECO_MIMI_PIN=${neco_mimi.pin}
	-DFW_NECO_MIMI_NUM_LEDS=${neco_mimi.num}
	; ── Camera 設定 ────────────────────────────────────────
	; CoreS3 SE（カメラ非搭載）では enabled=0 を設定してください。
	-DFW_CAMERA_ENABLED=${camera.enabled}
lib_deps = 
	m5stack/M5Unified @ ^0.1.6
	links2004/WebSockets @ ^2.4.1
	bblanchon/ArduinoJson @ ^7.0.4
	https://github.com/stack-chan/m5stack-avatar.git#v0.10.0
	sh123/esp32_opus@^1.0.3
	madhephaestus/ESP32Servo @ ^0.13.0
	fastled/FastLED @ ^3.7.0
build_src_filter = +<*> -<.git/> -<.pio/>

[stackchan]
ws_url = ws://192.168.3.6:8080/ws

[servo]
; デフォルトは Port A (SDA=1, SCL=2)。
; platformio.ini.local で [servo] セクションを再定義すれば上書きできます。
x_pin = 1
y_pin = 2

[led]
; M5GO Bottom3 の RGB LED データピン（CoreS3 用）。
; M5GO Bottom2（Core2 用）の公式サンプル: DATA_PIN=25（ESP32 は GPIO 25 あり）
; M5GO Bottom3 は CoreS3（ESP32-S3）用: GPIO 25 は存在しないため別ピンになる。
; CoreS3 実機での干渉を避けるため、既定は GPIO 5 を使用します。
; ⚠️ 実機で動作確認が取れたら platformio.ini.local にピン番号を記録してください。
pin = 5      ; M5GO Bottom3 + CoreS3 の推奨初期値
num = 10     ; M5GO Bottom3 の LED 数

[neco_mimi]
; NECO MIMI（NeoPixel 耳）の設定。
; NECO MIMI を使わない場合は enabled=0 のままにする（コンパイル時にジャンプから除外される）。
; NECO MIMI が接続されている場合は platformio.ini.local で enabled=1 に変更する。
enabled = 0
pin = 2      ; CoreS3 Port A (SDA) を接続先のデフォルトとする
num = 2      ; NECO MIMI の LED 数（左右 1 個ずつ）

[camera]
; カメラ機能の有効/無効設定。
; CoreS3（GC0308 搭載）: enabled=1
; CoreS3 SE（カメラ非搭載）: enabled=0
enabled = 1

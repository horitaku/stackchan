services:
  stackchan-server:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    image: stackchan-server:local
    container_name: stackchan-server
    env_file: ../../.env
    depends_on:
      db:
        condition: service_healthy
      voicevox:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV:-local}
      SERVER_ADDR: ${SERVER_ADDR:-:8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      PROVIDER_TIMEOUT_MS: ${PROVIDER_TIMEOUT_MS:-3000}
      PROVIDER_MAX_ATTEMPTS: ${PROVIDER_MAX_ATTEMPTS:-2}
      PROVIDER_RETRY_BASE_DELAY_MS: ${PROVIDER_RETRY_BASE_DELAY_MS:-100}
      # docker ネットワーク内ではサービス名で接続します（.env の 127.0.0.1 を上書き）
      VOICEVOX_BASE_URL: http://voicevox:50021
      DATABASE_URL: postgres://${POSTGRES_USER:-stackchan}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-stackchan}?sslmode=disable
    ports:
      - "8080:8080"

  voicevox:
    image: voicevox/voicevox_engine:cpu-ubuntu20.04-latest
    container_name: stackchan-voicevox
    restart: unless-stopped
    ports:
      - "50021:50021"

  db:
    image: postgres:16-alpine
    container_name: stackchan-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stackchan}
      POSTGRES_USER: ${POSTGRES_USER:-stackchan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stackchan} -d ${POSTGRES_DB:-stackchan}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
